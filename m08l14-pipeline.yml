   #Template Pipeline for CI/CD
   # trigger:
   # - main

   resources:
     repositories:
       - repository: self
         trigger: none

   stages:
     - stage: Build
       displayName: Build .Net Core Solution
       jobs:
         - job: Build
           pool:
             vmImage: ubuntu-latest
           steps:
             - task: DotNetCoreCLI@2
               displayName: Restore
               inputs:
                 command: "restore"
                 projects: "**/*.sln"
                 feedsToUse: "select"

             - task: DotNetCoreCLI@2
               displayName: Build
               inputs:
                 command: "build"
                 projects: "**/*.sln"

             - task: DotNetCoreCLI@2
               displayName: Publish
               inputs:
                 command: "publish"
                 publishWebProjects: true
                 arguments: "-o $(Build.ArtifactStagingDirectory)"

             - task: PublishBuildArtifacts@1
               displayName: Publish Artifacts ADO - Website
               inputs:
                 pathToPublish: "$(Build.ArtifactStagingDirectory)"
                 artifactName: Website

     - stage: Deploy
       displayName: Deploy to an Azure Web App
       jobs:
         - job: Deploy
           pool:
             vmImage: "windows-2019"
           steps:
             - task: DownloadBuildArtifacts@1
               inputs:
                 buildType: "current"
                 downloadType: "single"
                 artifactName: "Website"
                 downloadPath: "$(Build.ArtifactStagingDirectory)"
             - task: AzureLoadTest@1
               inputs:
                 azureSubscription: 'Ignite-lod50686456(6730fe05-8ecb-4a1d-9ed7-2e08770cc55b)'
                 loadTestConfigFile: '$(Build.SourcesDirectory)/jmeter/config.yaml'
                 resourceGroup: 'az400m08l14-RG'
                 loadTestResource: 'eShopOnWebLoadTesting-52031140'
                 loadTestRunName: 'ado_run'
                 loadTestRunDescription: 'Load testing from ADO'
             - publish: $(System.DefaultWorkingDirectory)/loadTest
               artifact: loadTestResults
             - task: AzureRmWebAppDeployment@5
               inputs:
                ConnectionType: 'AzureRM'
                azureSubscription: 'azure subs'
                appType: 'webApp'
                WebAppName: 'az400eshoponweb52031140'
                packageForLinux: '$(Build.ArtifactStagingDirectory)/**/Web.zip'
                AppSettings: '-UseOnlyInMemoryDatabase true -ASPNETCORE_ENVIRONMENT Development'
